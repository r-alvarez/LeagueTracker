services:
  leaguetracker:
    build: .
    container_name: leaguetracker
    expose:
      - "5170"
    ports:
      # Direct access stays available at localhost:5170 alongside the friendly name.
      - "5170:5170"
    environment:
      # Match dates/CSV timestamps render in this zone; LP ledger stays UTC.
      - TZ=Europe/London
      # Rank/LP still captured (can't be backfilled), just never shown.
      - Riot__HideLp=true
    volumes:
      # Everything persistent lives here: SQLite index, raw game files, LP
      # ledger CSV, and riot-api-key.txt (first line = the key).
      - ./data:/data
    restart: unless-stopped

  # Second tracked account (ImRA#5957): a full separate instance so its games,
  # baselines and LP never pollute the main account's coaching stats. Needs its
  # own data-alt/riot-api-key.txt (same key file, copied).
  leaguetracker-alt:
    build: .
    container_name: leaguetracker-alt
    expose:
      - "5170"
    ports:
      - "5171:5170"
    environment:
      - TZ=Europe/London
      - Riot__GameName=ImRA
      - Riot__TagLine=5957
      - Riot__HideLp=true
    volumes:
      - ./data-alt:/data
    restart: unless-stopped

  # Third tracked account (TheCosmicPeach#TTV), same isolation rationale.
  leaguetracker-ben:
    build: .
    container_name: leaguetracker-ben
    expose:
      - "5170"
    ports:
      - "5172:5170"
    environment:
      - TZ=Europe/London
      - Riot__GameName=TheCosmicPeach
      - Riot__TagLine=TTV
    volumes:
      - ./data-ben:/data
    restart: unless-stopped

  # Reverse proxy so the app is reachable at http://leaguetracker.localhost
  # (no port). Browsers resolve *.localhost to loopback; a hosts entry makes it
  # bulletproof for non-browser clients too.
  proxy:
    image: caddy:2-alpine
    container_name: leaguetracker-proxy
    depends_on:
      - leaguetracker
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
