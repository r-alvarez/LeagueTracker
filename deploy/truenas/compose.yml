# TrueNAS deployment (Portainer repository stack).
# Traefik on the external `frontend` network is the only way in — no host
# ports. The render agent on the gaming PC reaches the tracker through the
# same hostnames (split-horizon DNS points them at the NAS on the LAN).
#
# GitOps note: Portainer CE polling appears to redeploy only when THIS file
# changes, not on every repo commit (probe: 2026-07-18).

x-lt-build: &lt-build
  context: ../..
  dockerfile: Dockerfile

services:
  leaguetracker:
    build: *lt-build
    pull_policy: build
    image: leaguetracker:local
    container_name: leaguetracker
    user: "568:568"
    environment:
      - TZ=Europe/London
      # Rank/LP display back on (2026-07-16), matching the local compose: the
      # process-first review views exist now, so rank reads as context, not
      # the verdict. Capture never stopped while it was hidden.
      - Riot__HideLp=false
    volumes:
      - /mnt/MediaPool/apps/leaguetracker/main:/data
    networks: [frontend]
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.services.leaguetracker.loadbalancer.server.port=5170
      - traefik.http.routers.leaguetracker.rule=Host(`league.rjav-tech.co.uk`)
      - traefik.http.routers.leaguetracker.entrypoints=websecure
      - traefik.http.routers.leaguetracker.tls.certResolver=cloudflare
      - traefik.http.routers.leaguetracker.priority=100
      - traefik.http.routers.leaguetracker.service=leaguetracker

  leaguetracker-alt:
    build: *lt-build
    pull_policy: build
    image: leaguetracker:local
    container_name: leaguetracker-alt
    user: "568:568"
    environment:
      - TZ=Europe/London
      - Riot__GameName=ImRA
      - Riot__TagLine=5957
      - Riot__HideLp=false
    volumes:
      - /mnt/MediaPool/apps/leaguetracker/alt:/data
    networks: [frontend]
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.services.leaguetracker-alt.loadbalancer.server.port=5170
      - traefik.http.routers.leaguetracker-alt.rule=Host(`league-alt.rjav-tech.co.uk`)
      - traefik.http.routers.leaguetracker-alt.entrypoints=websecure
      - traefik.http.routers.leaguetracker-alt.tls.certResolver=cloudflare
      - traefik.http.routers.leaguetracker-alt.priority=100
      - traefik.http.routers.leaguetracker-alt.service=leaguetracker-alt

  leaguetracker-ben:
    build: *lt-build
    pull_policy: build
    image: leaguetracker:local
    container_name: leaguetracker-ben
    user: "568:568"
    environment:
      - TZ=Europe/London
      - Riot__GameName=TheCosmicPeach
      - Riot__TagLine=TTV
    volumes:
      - /mnt/MediaPool/apps/leaguetracker/ben:/data
    networks: [frontend]
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.services.leaguetracker-ben.loadbalancer.server.port=5170
      - traefik.http.routers.leaguetracker-ben.rule=Host(`league-ben.rjav-tech.co.uk`)
      - traefik.http.routers.leaguetracker-ben.entrypoints=websecure
      - traefik.http.routers.leaguetracker-ben.tls.certResolver=cloudflare
      - traefik.http.routers.leaguetracker-ben.priority=100
      - traefik.http.routers.leaguetracker-ben.service=leaguetracker-ben

networks:
  frontend:
    external: true
